<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelado - Vazerk</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Fjalla+One|Libre+Baskerville">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .message-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .cancel-icon {
            font-size: 64px;
            color: #e63946;
            margin-bottom: 20px;
        }
        .title {
            font-family: 'Fjalla One', sans-serif;
            font-size: 32px;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #111;
        }
        .text {
            font-family: 'Libre Baskerville', serif;
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: #111;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-family: 'Fjalla One', sans-serif;
            text-transform: uppercase;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #333;
        }
    </style>
</head>
<body style="background: #f4f6fb;">
    <div class="message-container">
        <i class="fas fa-times-circle cancel-icon"></i>
        <h1 class="title">Pagamento Cancelado</h1>
        <p class="text">O processo de pagamento foi interrompido. Nenhuma cobrança foi efetuada. Se desejar, pode tentar comprar o produto novamente.</p>
        <a href="home.html" class="btn">Voltar à loja</a>
    </div>
<script src="/navbar.js" defer></script>
<script src="/cookies.js" defer></script>
</body>
</html>
